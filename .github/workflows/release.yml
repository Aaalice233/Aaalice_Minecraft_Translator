name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify bundled i18n dictionary
        shell: pwsh
        run: |
          $dict = "src-tauri/resources/i18n-dict/Dict-Sqlite.db"
          if (-not (Test-Path $dict)) {
            throw "Bundled i18n dictionary not found: $dict"
          }
          $file = Get-Item $dict
          if ($file.Length -lt 100MB) {
            throw "Bundled i18n dictionary is too small, Git LFS content was not checked out: $($file.Length) bytes"
          }
          $buffer = New-Object byte[] 15
          $stream = [System.IO.File]::OpenRead($dict)
          try {
            $read = $stream.Read($buffer, 0, $buffer.Length)
          } finally {
            $stream.Dispose()
          }
          $header = [System.Text.Encoding]::ASCII.GetString($buffer, 0, $read)
          if ($header -ne "SQLite format 3") {
            throw "Bundled i18n dictionary is not a SQLite database. Header: $header"
          }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app with updater signature
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.UPDATER_SIGN_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.UPDATER_SIGN_PRIVATE_KEY_PASSWORD }}
        run: npm run package:exe

      - name: Prepare portable exe asset
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $source = "src-tauri/target/release/aaalice_mc_translator.exe"
          if (-not (Test-Path $source)) {
            throw "Portable exe source not found: $source"
          }

          $portableDir = "src-tauri/target/release/bundle/portable"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          $portableName = "Aaalice-MC-Translator_${version}_portable.exe"
          Copy-Item $source (Join-Path $portableDir $portableName) -Force
          Write-Host "Portable exe prepared: $portableName"

      - name: Generate update.json
        shell: pwsh
        run: |
          # Read version from tauri.conf.json (source of truth for getVersion())
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version

          # Auto-detect the installer and signature files (Tauri NSIS bundler normalizes spaces to dots)
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $installerFile = Get-ChildItem "${nsisDir}" -Filter "*.exe" | Select-Object -First 1
          if (-not $installerFile) {
            throw "No installer found in ${nsisDir}"
          }
          $installerPath = $installerFile.FullName
          $installerName = $installerFile.Name
          $sigPath = "${installerPath}.sig"

          # Signature file must exist — fail the build if missing
          if (-not (Test-Path $sigPath)) {
            throw "Signature file not found: $sigPath`nCheck: 1) createUpdaterArtifacts: true in tauri.conf.json 2) TAURI_SIGNING_PRIVATE_KEY Secret is configured"
          }
          $sig = Get-Content $sigPath -Raw
          $releaseInstallerName = $installerName -replace '\s+', '.'
          if ($releaseInstallerName -ne $installerName) {
            Rename-Item -LiteralPath $installerPath -NewName $releaseInstallerName
            $installerName = $releaseInstallerName
          }

          $updateJson = @"
          {
            "version": "$version",
            "notes": "See GitHub Release notes for details",
            "pub_date": "$(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ' -AsUTC)",
            "platforms": {
              "windows-x86_64": {
                "signature": "$($sig.Trim())",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$([System.Uri]::EscapeDataString($installerName))"
              }
            }
          }
          "@
          $updateJson | Set-Content "update.json"
          Write-Host "update.json generated for version $version"

      - name: Extract release notes from CHANGELOG
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $inSection = $false
          $lines = Get-Content CHANGELOG.md
          foreach ($line in $lines) {
            if ($line -match "^## v$version") { $inSection = $true }
            elseif ($line -match "^## v" -and $inSection) { break }
            if ($inSection) { Add-Content -Path release-notes.md -Value $line }
          }
          Add-Content -Path release-notes.md -Value ""
          Add-Content -Path release-notes.md -Value "## 下载说明"
          Add-Content -Path release-notes.md -Value ""
          Add-Content -Path release-notes.md -Value "- **安装版**：推荐普通用户下载，支持自定义安装目录、开始菜单/快捷方式和应用内自动更新。"
          Add-Content -Path release-notes.md -Value "- **便携版**：无需安装，适合临时使用或放在 U 盘中随身携带；更新时需要手动下载新版。"
          Write-Host "Extracted release notes for v$version"

      - name: Upload assets to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/portable/*.exe
            update.json
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
